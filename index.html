<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nobo Class - Live Test Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; padding: 20px; text-align: center; color: #333; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        .status { font-size: 13px; color: #7f8c8d; margin-bottom: 25px; }
        .box { border: 1px solid #e2e8f0; padding: 20px; border-radius: 10px; margin-bottom: 20px; background: #f8fafc; text-align: left; }
        h3 { margin-top: 0; color: #34495e; font-size: 16px; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 5px;}
        .btn-black { background: #0f172a; color: white; }
        .btn-black:hover { background: #1e293b; }
        .btn-green { background: #10b981; color: white; }
        .btn-green:hover { background: #059669; }
        .btn-orange { background: #f97316; color: white; }
        .alert { padding: 10px; margin-top: 10px; border-radius: 5px; font-size: 13px; display: none; }
        .alert-success { background: #d1fae5; color: #065f46; }
    </style>
</head>
<body>

<div class="container">
    <h2>Nobo Class Test Panel</h2>
    <div class="status">প্র্যাক্টিক্যাল নোটিফিকেশন টেস্টিং সিস্টেম (ফিক্সড ভার্সন)</div>

    <div class="box">
        <h3>১. সেটিংস কনফিগার করুন</h3>
        <label>OneSignal App ID:</label>
        <input type="text" id="app-id" placeholder="এখানে আপনার OneSignal App ID বসান">
        <label>OneSignal REST API Key:</label>
        <input type="text" id="api-key" placeholder="এখানে আপনার REST API Key বসান">
    </div>

    <div class="box">
        <h3>২. অ্যাপ লগইন টেস্ট</h3>
        <p style="font-size: 13px; color: #64748b; margin: 0 0 10px 0;">আইডি বক্সে না আসলে নিচের "ম্যানুয়াল চেক" বাটনে চাপ দিন।</p>
        <label>আপনার ওয়ানসিগন্যাল আইডি (Subscription ID):</label>
        <input type="text" id="os-id" placeholder="আইডির জন্য অপেক্ষা করা হচ্ছে..." readonly style="background: #e2e8f0; font-weight: bold; color: #0f172a;">
        
        <button class="btn-orange" onclick="checkSavedId()">🔄 আইডি ম্যানুয়াল চেক করুন</button>
        <button class="btn-black" onclick="saveToLocalDatabase()">💾 লগইন করুন (সেভ আইডি)</button>
        <div id="login-alert" class="alert alert-success">লগইন সফল! আইডি ব্রাউজার ডাটাবেজে সেভ হয়েছে।</div>
    </div>

    <div class="box">
        <h3>৩. নোটিফিকেশন শিডিউল করুন</h3>
        <label>নোটিফিকেশন মেসেজ:</label>
        <input type="text" id="msg-text" value="হ্যালো ফাহিম! আপনার Nobo Class-এর টেস্ট ক্লাসটি এখনই শুরু হচ্ছে। ⏰">
        <label>কয়টার সময় নোটিফিকেশন যাবে (টাইম সেট করুন):</label>
        <input type="datetime-local" id="notify-time">
        <button class="btn-green" onclick="scheduleNotification()">⏰ টাইম সেট করে শিডিউল করুন</button>
        <div id="schedule-alert" class="alert alert-success">সফলভাবে ওয়ানসিগন্যালে শিডিউল করা হয়েছে!</div>
    </div>
</div>

<script>
    // ১. কডুলার অ্যাপ থেকে আইডি রিসিভ করার গ্লোবাল ফাংশন
    window.setOneSignalId = function(id) {
        if(id && id !== "" && id !== "null") {
            document.getElementById('os-id').value = id;
            localStorage.setItem('temp_onesignal_id', id);
            console.log("OneSignal ID received successfully: " + id);
        }
    };

    // পেজ লোড হওয়ার পর স্বয়ংক্রিয় চেকার লজিক
    window.onload = function() {
        // যদি ব্রাউজারে আগে থেকেই আইডি সেভ থাকে
        const saved = localStorage.getItem('saved_onesignal_id') || localStorage.getItem('temp_onesignal_id');
        if(saved) {
            document.getElementById('os-id').value = saved;
        }

        // অটো-রিফ্রেশ লজিক: প্রতি ২ সেকেন্ড পর পর লোকাল মেমোরি চেক করবে আইডি এসেছে কিনা
        setInterval(function() {
            const currentInput = document.getElementById('os-id').value;
            if(!currentInput || currentInput.includes("অপেক্ষা")) {
                const tempId = localStorage.getItem('temp_onesignal_id');
                if(tempId) {
                    document.getElementById('os-id').value = tempId;
                }
            }
        }, 2000);

        // টাইমের বক্সে বর্তমান সময় থেকে ৩ মিনিট পরের সময় ডিফল্ট সেট করা
        let now = new Date();
        now.setMinutes(now.getMinutes() + 3);
        // লোকাল টাইমজোন অনুযায়ী ইনপুট ফিল্ডের ফরম্যাট ঠিক করা
        let tzOffset = now.getTimezoneOffset() * 60000;
        let localISOTime = (new Date(now - tzOffset)).toISOString().slice(0, 16);
        document.getElementById('notify-time').value = localISOTime;
    };

    // ম্যানুয়ালি মেমোরি থেকে আইডি বক্সে টানার ফাংশন
    function checkSavedId() {
        const tempId = localStorage.getItem('temp_onesignal_id') || localStorage.getItem('saved_onesignal_id');
        if (tempId && tempId !== "null") {
            document.getElementById('os-id').value = tempId;
            alert("সফল! অ্যাপ থেকে পাঠানো আইডি পাওয়া গেছে: " + tempId);
        } else {
            alert("এখনো কোনো আইডি পাওয়া যায়নি। অনুগ্রহ করে অ্যাপটি মিনিমাইজ করে আবার ওপেন করুন অথবা ১ সেকেন্ড অপেক্ষা করুন।");
        }
    }

    // ২. আইডিটি ডাটাবেজে (localStorage) কনফার্ম সেভ করা
    function saveToLocalDatabase() {
        const id = document.getElementById('os-id').value;
        if(!id || id.includes("অপেক্ষা")) { 
            alert("কোনো বৈধ ওয়ানসিগন্যাল আইডি পাওয়া যায়নি!"); 
            return; 
        }
        localStorage.setItem('saved_onesignal_id', id);
        document.getElementById('login-alert').style.display = 'block';
        setTimeout(() => { document.getElementById('login-alert').style.display = 'none'; }, 3000);
    }

    // ৩. ওয়ানসিগন্যাল REST API কল করে নোটিফিকেশন শিডিউল করা
    async function scheduleNotification() {
        const appId = document.getElementById('app-id').value.trim();
        const apiKey = document.getElementById('api-key').value.trim();
        const userOSId = document.getElementById('os-id').value.trim();
        const message = document.getElementById('msg-text').value;
        const inputTime = document.getElementById('notify-time').value;

        if(!appId || !apiKey || !userOSId || userOSId.includes("অপেক্ষা")) {
            alert("অনুগ্রহ করে ওয়ানসিগন্যাল App ID, API Key এবং ওয়ানসিগন্যাল আইডি নিশ্চিত করুন!");
            return;
        }

        if(!inputTime) {
            alert("অনুগ্রহ করে নোটিফিকেশনের সময় সিলেক্ট করুন!");
            return;
        }

        // ইনপুট করা লোকাল সময়কে ওয়ানসিগন্যালের গ্রহণযোগ্য UTC ফরম্যাটে নিখুঁতভাবে রূপান্তর
        let targetDate = new Date(inputTime);
        let targetTimeStr = targetDate.toISOString().replace('T', ' ').substring(0, 19) + " UTC";

        try {
            const response = await fetch("https://onesignal.com/api/v1/notifications", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json; charset=utf-8",
                    "Authorization": "Basic " + apiKey
                },
                body: JSON.stringify({
                    app_id: appId,
                    include_subscription_ids: [userOSId],
                    headings: { "en": "Nobo Class Live Test ⏰" },
                    contents: { "en": message },
                    send_after: targetTimeStr
                })
            });

            const data = await response.json();
            if(data.id) {
                document.getElementById('schedule-alert').style.display = 'block';
                alert("দারুণ! ওয়ানসিগন্যালে নোটিফিকেশন শিডিউল হয়ে গেছে। আইডি: " + data.id);
                setTimeout(() => { document.getElementById('schedule-alert').style.display = 'none'; }, 4000);
            } else {
                alert("OneSignal Error: " + JSON.stringify(data.errors));
            }
        } catch (error) {
            alert("রিকোয়েস্ট পাঠাতে সমস্যা হয়েছে: " + error);
        }
    }
</script>

</body>
</html>
